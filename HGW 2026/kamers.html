<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kamers — HGW 2026</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar"></header>

    <main class="container">
      <h1>Kamerindeling</h1>
      <p class="muted">
        Wie slaapt waar. <span class="sync-badge" data-sync-badge></span>
      </p>

      <div class="card">
        <h3>Nieuwe kamer</h3>
        <form id="room-form">
          <div class="row">
            <div class="field">
              <label for="number">Kamernr.</label>
              <input id="number" name="number" required />
            </div>
            <div class="field">
              <label for="occupants">Bewoners (komma-gescheiden)</label>
              <input id="occupants" name="occupants" placeholder="Jan, Piet, kids" />
            </div>
          </div>
          <div class="field">
            <label for="note">Notitie</label>
            <input id="note" name="note" placeholder="bv. familiekamer, 2 eenpersoons" />
          </div>
          <button type="submit" class="btn-accent">Toevoegen</button>
        </form>
      </div>

      <h2>Overzicht</h2>
      <div id="rooms" class="rooms-grid"></div>
    </main>

    <footer>HGW '26</footer>

    <script type="module">
      import { initPage } from "./js/app.js";
      import { getAll, add } from "./js/data.js";

      initPage();
      const grid = document.getElementById("rooms");

      async function render() {
        const rooms = await getAll("rooms", { order: "number" });
        if (!rooms.length) {
          grid.innerHTML = `<p class="empty">Nog geen kamers ingevuld.</p>`;
          return;
        }
        grid.innerHTML = rooms
          .map((r) => {
            const occ = (r.occupants || "")
              .split(",")
              .map((s) => s.trim())
              .filter(Boolean);
            return `
              <div class="room">
                <span class="num">#${r.number}</span>
                <ul>
                  ${occ.map((o) => `<li>${o}</li>`).join("") || "<li class='muted'>leeg</li>"}
                </ul>
                ${r.note ? `<div class="muted">${r.note}</div>` : ""}
              </div>
            `;
          })
          .join("");
      }

      document.getElementById("room-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const form = e.target;
        const data = new FormData(form);
        await add("rooms", {
          number: data.get("number"),
          occupants: data.get("occupants") || "",
          note: data.get("note") || null,
        });
        form.reset();
        render();
      });

      render();
    </script>
  </body>
</html>
