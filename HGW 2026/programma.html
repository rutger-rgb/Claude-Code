<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Programma — HGW 2026</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar"></header>

    <main class="container">
      <h1>Programma</h1>
      <p class="muted">
        Wat, waar, hoe laat. <span class="sync-badge" data-sync-badge></span>
      </p>

      <div class="card">
        <h3>Nieuw programma-item</h3>
        <form id="pg-form">
          <div class="row">
            <div class="field">
              <label for="starts_at">Datum + tijd</label>
              <input id="starts_at" name="starts_at" type="datetime-local" required />
            </div>
            <div class="field">
              <label for="title">Titel</label>
              <input id="title" name="title" required placeholder="bv. Bowlen" />
            </div>
          </div>
          <div class="field">
            <label for="description">Omschrijving</label>
            <input id="description" name="description" placeholder="bv. Team A vs Team B, baan 3-4" />
          </div>
          <button type="submit" class="btn-accent">Toevoegen</button>
        </form>
      </div>

      <div id="schedule"></div>
    </main>

    <footer>HGW '26</footer>

    <script type="module">
      import { initPage } from "./js/app.js";
      import { getAll, add } from "./js/data.js";

      initPage();
      const root = document.getElementById("schedule");

      const DAYS = [
        "zondag",
        "maandag",
        "dinsdag",
        "woensdag",
        "donderdag",
        "vrijdag",
        "zaterdag",
      ];

      function formatDay(d) {
        return `${DAYS[d.getDay()]} ${d.getDate()} ${[
          "jan",
          "feb",
          "mrt",
          "apr",
          "mei",
          "jun",
          "jul",
          "aug",
          "sep",
          "okt",
          "nov",
          "dec",
        ][d.getMonth()]}`;
      }

      function formatTime(d) {
        return d.toTimeString().slice(0, 5);
      }

      async function render() {
        const items = await getAll("program", { order: "starts_at" });
        if (!items.length) {
          root.innerHTML = `<p class="empty">Nog geen programma-items.</p>`;
          return;
        }
        // Groepeer per dag
        const byDay = {};
        for (const it of items) {
          const d = new Date(it.starts_at);
          const key = d.toDateString();
          (byDay[key] = byDay[key] || []).push(it);
        }
        root.innerHTML = Object.entries(byDay)
          .map(([key, list]) => {
            const d = new Date(key);
            const items = list
              .sort((a, b) => new Date(a.starts_at) - new Date(b.starts_at))
              .map((it) => {
                const t = new Date(it.starts_at);
                return `
                  <div class="timeline-item">
                    <div class="time">${formatTime(t)}</div>
                    <span class="title">${it.title}</span>
                    ${it.description ? `<div class="description">${it.description}</div>` : ""}
                  </div>
                `;
              })
              .join("");
            return `
              <div class="day-header">${formatDay(d)}</div>
              <div class="timeline">${items}</div>
            `;
          })
          .join("");
      }

      document.getElementById("pg-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const form = e.target;
        const data = new FormData(form);
        await add("program", {
          starts_at: new Date(data.get("starts_at")).toISOString(),
          title: data.get("title"),
          description: data.get("description") || null,
        });
        form.reset();
        render();
      });

      render();
    </script>
  </body>
</html>
