<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foto-wall — HGW 2026</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar"></header>

    <main class="container">
      <h1>Foto-wall</h1>
      <p class="muted">
        Gedeelde polaroids van het weekend.
        <span class="sync-badge" data-sync-badge></span>
      </p>

      <div class="card">
        <h3>Upload een foto</h3>
        <form id="photo-form">
          <div class="field">
            <label for="file">Foto</label>
            <input id="file" name="file" type="file" accept="image/*" required />
          </div>
          <div class="field">
            <label for="caption">Onderschrift</label>
            <input id="caption" name="caption" placeholder="bv. De bowlingkampioenen" />
          </div>
          <div class="field">
            <label for="uploader">Jouw naam</label>
            <input id="uploader" name="uploader" />
          </div>
          <button type="submit" class="btn-accent">Plakken</button>
        </form>
        <p id="upload-status" class="muted"></p>
      </div>

      <div id="wall" class="photo-wall"></div>
    </main>

    <footer>HGW '26</footer>

    <script type="module">
      import { initPage } from "./js/app.js";
      import { getAll, add, uploadPhoto } from "./js/data.js";

      initPage();
      const wall = document.getElementById("wall");
      const status = document.getElementById("upload-status");

      async function render() {
        const photos = await getAll("photos", {
          order: "created_at",
          ascending: false,
        });
        if (!photos.length) {
          wall.innerHTML = `<p class="empty">Nog geen foto's. Upload de eerste!</p>`;
          return;
        }
        wall.innerHTML = photos
          .map(
            (p) => `
              <div class="polaroid">
                <img src="${p.url}" alt="${p.caption || "foto"}" />
                <div class="caption">${p.caption || ""}</div>
              </div>
            `
          )
          .join("");
      }

      document.getElementById("photo-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const form = e.target;
        const data = new FormData(form);
        const file = data.get("file");
        if (!file || file.size === 0) return;
        status.textContent = "Uploaden…";
        try {
          const url = await uploadPhoto(file);
          await add("photos", {
            url,
            caption: data.get("caption") || null,
            uploader: data.get("uploader") || null,
          });
          form.reset();
          status.textContent = "Geplakt op de muur!";
          render();
        } catch (err) {
          status.textContent = "Er ging iets mis: " + err.message;
        }
      });

      render();
    </script>
  </body>
</html>
