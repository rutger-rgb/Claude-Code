<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smoelenboek — HGW 2026</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar"></header>

    <main class="container">
      <h1>Smoelenboek</h1>
      <p class="muted">
        Wie is wie? <span class="sync-badge" data-sync-badge></span>
      </p>

      <div class="card">
        <h3>Voeg iemand toe</h3>
        <form id="person-form">
          <div class="row">
            <div class="field">
              <label for="name">Naam</label>
              <input id="name" name="name" required />
            </div>
            <div class="field">
              <label for="nickname">Bijnaam</label>
              <input id="nickname" name="nickname" placeholder="bv. Bakkie" />
            </div>
          </div>
          <div class="row">
            <div class="field">
              <label for="partner">Partner</label>
              <input id="partner" name="partner" />
            </div>
            <div class="field">
              <label for="kids_count">Aantal kids mee</label>
              <input id="kids_count" name="kids_count" type="number" min="0" value="0" />
            </div>
          </div>
          <div class="field">
            <label for="avatar">Foto (optioneel)</label>
            <input id="avatar" name="avatar" type="file" accept="image/*" />
          </div>
          <button type="submit" class="btn-accent">Toevoegen</button>
        </form>
      </div>

      <h2>De groep</h2>
      <div id="people" class="people-grid"></div>
    </main>

    <footer>HGW '26</footer>

    <script type="module">
      import { initPage } from "./js/app.js";
      import { getAll, add, uploadPhoto } from "./js/data.js";

      initPage();

      const grid = document.getElementById("people");

      function initials(name) {
        return name
          .split(/\s+/)
          .map((w) => w[0])
          .slice(0, 2)
          .join("")
          .toUpperCase();
      }

      async function render() {
        const people = await getAll("people", { order: "name" });
        if (!people.length) {
          grid.innerHTML = `<p class="empty">Nog niemand toegevoegd.</p>`;
          return;
        }
        grid.innerHTML = people
          .map((p) => {
            const avatar = p.avatar_url
              ? `<img class="avatar" src="${p.avatar_url}" alt="${p.name}" />`
              : `<div class="avatar">${initials(p.name || "?")}</div>`;
            const meta = [
              p.partner && `+ ${p.partner}`,
              p.kids_count > 0 && `${p.kids_count} kids`,
            ]
              .filter(Boolean)
              .join(" · ");
            return `
              <div class="person">
                ${avatar}
                <h3>${p.name}</h3>
                ${p.nickname ? `<div class="nickname">"${p.nickname}"</div>` : ""}
                ${meta ? `<div class="meta">${meta}</div>` : ""}
              </div>
            `;
          })
          .join("");
      }

      document
        .getElementById("person-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const form = e.target;
          const data = new FormData(form);
          const file = data.get("avatar");
          let avatar_url = null;
          if (file && file.size > 0) {
            avatar_url = await uploadPhoto(file);
          }
          await add("people", {
            name: data.get("name"),
            nickname: data.get("nickname") || null,
            partner: data.get("partner") || null,
            kids_count: Number(data.get("kids_count") || 0),
            avatar_url,
          });
          form.reset();
          render();
        });

      render();
    </script>
  </body>
</html>
