<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff6b9d"/>
      <stop offset="1" stop-color="#ff2d55"/>
    </linearGradient>
    <linearGradient id="marble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f5f7"/>
      <stop offset="1" stop-color="#b8b8c2"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5a2b"/>
      <stop offset="1" stop-color="#5e3a18"/>
    </linearGradient>
  </defs>

  <!-- App background -->
  <rect width="512" height="512" rx="112" fill="#0a0a0f"/>
  <circle cx="256" cy="256" r="180" fill="url(#bg)" opacity="0.22"/>

  <!-- Classical Greek bust silhouette -->
  <g transform="translate(180 110)">
    <!-- Pedestal -->
    <rect x="-20" y="290" width="200" height="30" rx="4" fill="#2a2a36"/>
    <rect x="-10" y="260" width="180" height="30" fill="url(#marble)" opacity="0.9"/>
    <!-- Neck + shoulders -->
    <path d="M 30 240 Q 80 260 160 240 L 175 260 L 5 260 Z" fill="url(#marble)"/>
    <!-- Head -->
    <ellipse cx="90" cy="150" rx="70" ry="85" fill="url(#marble)"/>
    <!-- Hair waves -->
    <path d="M 25 110 Q 40 80 70 85 Q 95 75 120 85 Q 150 80 160 115 Q 155 90 140 95 Q 120 85 95 92 Q 70 85 50 95 Q 35 98 25 110 Z" fill="#9a9aa6"/>
    <!-- Eyes (classical blank stare) -->
    <ellipse cx="65" cy="155" rx="6" ry="8" fill="#2a2a36"/>
    <ellipse cx="115" cy="155" rx="6" ry="8" fill="#2a2a36"/>
    <!-- Nose -->
    <path d="M 90 160 L 85 195 L 95 200 L 100 195 Z" fill="#b8b8c2"/>
    <!-- Nietzsche moustache — the whole point -->
    <path d="M 50 210 Q 60 200 75 208 Q 85 214 90 212 Q 95 214 105 208 Q 120 200 130 210 Q 135 220 125 222 Q 115 220 105 216 Q 95 220 90 218 Q 85 220 75 216 Q 65 220 55 222 Q 45 220 50 210 Z" fill="#3a2a1a"/>
  </g>

  <!-- Hammer, held at a jaunty angle next to the bust -->
  <g transform="translate(340 280) rotate(25)">
    <!-- Handle -->
    <rect x="-6" y="0" width="12" height="130" rx="3" fill="url(#wood)"/>
    <!-- Head -->
    <rect x="-40" y="-25" width="80" height="40" rx="4" fill="#5a5a66"/>
    <rect x="-40" y="-25" width="80" height="6" fill="#8a8a96"/>
    <rect x="-40" y="9" width="80" height="6" fill="#2a2a36"/>
  </g>
</svg>
